name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do? What's painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like MatrixCtrl to do?
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Related roadmap area (optional)
      description: See docs/ROADMAP.md
      options:
        - Config management
        - Helm / upgrades
        - Setup / onboarding
        - User / room management
        - Day-2 ops (RTC, TLS/DNS, backup)
        - Federation / bridges
        - Audit / observability
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
