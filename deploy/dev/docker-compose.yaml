services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: matrixctrl
      POSTGRES_USER: matrixctrl
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matrixctrl"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
