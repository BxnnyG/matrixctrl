# MatrixCtrl Helm Chart — values.yaml
# Minimal required fields: image.tag, secrets.*

image:
  repository: ghcr.io/bxnnyg/matrixctrl
  tag: "latest"
  pullPolicy: IfNotPresent

# Resource limits
resources:
  matrixctrl:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  postgres:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# ESS deployment to manage
ess:
  namespace: ess
  release: ess

# Persistent storage
storage:
  postgres:
    size: 5Gi
    storageClass: local-path
  config:
    size: 1Gi
    storageClass: local-path

# Ingress / hostname
ingress:
  enabled: true
  host: matrixctrl.example.com
  # Traefik entrypoint — "websecure" for HTTPS, "web" for HTTP
  entrypoint: websecure
  tls: true
  # Set to "letsencrypt" or your cert-manager ClusterIssuer name.
  # Leave empty if TLS is terminated externally (Cloudflare Tunnel etc.).
  certIssuer: ""

# Secrets — leave empty to AUTO-GENERATE on first install.
# Generated values are stored in the matrixctrl Secret and reused across upgrades
# (the Secret carries helm.sh/resource-policy: keep). Only set these if you want
# to manage credentials externally (e.g. SealedSecrets / external-secrets).
secrets:
  # Postgres password for the sidecar. Empty = auto-generate (randAlphaNum 32).
  dbPassword: ""
  # HS256 signing key for JWT tokens. Empty = auto-generate (randAlphaNum 48).
  jwtSecret: ""
  # Initial bootstrap admin password (logged on first run if unset).
  adminPassword: ""

# OIDC via MAS — optional. Leave clientId empty to start in bootstrap mode and
# wire OIDC later via the in-app Setup → "Connect Matrix Login" flow.
oidc:
  enabled: false
  issuer: "https://mas.example.com"
  clientId: ""
  clientSecret: ""
  # Full public URL that MAS will redirect back to after login
  redirectUri: "https://matrixctrl.example.com/api/v1/auth/oidc/callback"
  # Comma-separated list of allowed MAS user IDs (ULIDs). Takes priority over
  # requireAdmin. Leave empty to use the admin check below.
  allowedUsers: ""
  # When true (default), only MAS admins (can_request_admin=true) may log in.
  # MatrixCtrl verifies this via the MAS Admin API using its own client creds.
  requireAdmin: true

# Config seed — path inside the container that is copied into the
# git config repo on first start.  Leave empty to start with no slices.
configSeedPath: ""
