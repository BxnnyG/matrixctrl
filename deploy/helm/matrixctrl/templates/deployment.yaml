apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrixctrl
  namespace: matrixctrl
  labels:
    {{- include "matrixctrl.labels" . | nindent 4 }}
spec:
  replicas: 1
  # Recreate avoids two pods fighting over the PVC and the embedded Postgres
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "matrixctrl.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "matrixctrl.selectorLabels" . | nindent 8 }}
      annotations:
        # Force a rollout when the secret changes
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: matrixctrl
      # NOTE: no wait-for-postgres initContainer — Postgres is a sidecar in this
      # same pod and cannot start until initContainers finish (would deadlock).
      # The matrixctrl container retries the DB connection on startup instead.
      containers:
        # ── MatrixCtrl ─────────────────────────────────────────────────────
        - name: matrixctrl
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MATRIXCTRL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "matrixctrl.secretName" . }}
                  key: db-password
            - name: MATRIXCTRL_DB_URL
              value: "postgres://matrixctrl:$(MATRIXCTRL_DB_PASSWORD)@127.0.0.1:5432/matrixctrl?sslmode=disable"
            - name: MATRIXCTRL_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "matrixctrl.secretName" . }}
                  key: jwt-secret
            {{- if .Values.secrets.adminPassword }}
            - name: MATRIXCTRL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "matrixctrl.secretName" . }}
                  key: admin-password
            {{- end }}
            - name: MATRIXCTRL_ESS_NAMESPACE
              value: {{ .Values.ess.namespace | quote }}
            - name: MATRIXCTRL_ESS_RELEASE
              value: {{ .Values.ess.release | quote }}
            - name: MATRIXCTRL_CONFIG_REPO
              value: /data/config-repo
            {{- if .Values.configSeedPath }}
            - name: MATRIXCTRL_CONFIG_SEED
              value: {{ .Values.configSeedPath | quote }}
            {{- end }}
            {{- if .Values.oidc.enabled }}
            - name: MATRIXCTRL_OIDC_ISSUER
              value: {{ .Values.oidc.issuer | quote }}
            - name: MATRIXCTRL_OIDC_REDIRECT_URI
              value: {{ .Values.oidc.redirectUri | quote }}
            - name: MATRIXCTRL_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "matrixctrl.secretName" . }}
                  key: oidc-client-id
            - name: MATRIXCTRL_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "matrixctrl.secretName" . }}
                  key: oidc-client-secret
            {{- if .Values.oidc.allowedUsers }}
            - name: MATRIXCTRL_OIDC_ALLOWED_USERS
              value: {{ .Values.oidc.allowedUsers | quote }}
            {{- end }}
            - name: MATRIXCTRL_REQUIRE_ADMIN
              value: {{ .Values.oidc.requireAdmin | quote }}
            {{- end }}
          volumeMounts:
            - name: config-repo
              mountPath: /data/config-repo
          readinessProbe:
            httpGet:
              path: /api/v1/auth/oidc/available
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/auth/oidc/available
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources.matrixctrl | nindent 12 }}

        # ── Postgres sidecar ───────────────────────────────────────────────
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: matrixctrl
            - name: POSTGRES_USER
              value: matrixctrl
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "matrixctrl.secretName" . }}
                  key: db-password
            # Store data in a sub-directory so the PVC root stays clean
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "matrixctrl", "-d", "matrixctrl"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "matrixctrl", "-d", "matrixctrl"]
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources.postgres | nindent 12 }}

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: matrixctrl-postgres
        - name: config-repo
          persistentVolumeClaim:
            claimName: matrixctrl-config
