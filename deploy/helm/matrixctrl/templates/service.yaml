apiVersion: v1
kind: Service
metadata:
  name: matrixctrl
  namespace: matrixctrl
  labels:
    {{- include "matrixctrl.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "matrixctrl.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
