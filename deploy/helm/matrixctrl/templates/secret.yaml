{{- /*
  Self-configuring secrets.

  On first install, db-password and jwt-secret are auto-generated with
  cryptographically-random values — the operator does NOT need to set anything.
  On upgrades, the existing Secret is looked up and its values reused, so the
  generated credentials stay stable across `helm upgrade`.

  An explicit value in values.yaml (secrets.dbPassword / secrets.jwtSecret) always
  wins, for operators who want to manage secrets externally (e.g. SealedSecrets).
*/}}
{{- $secretName := include "matrixctrl.secretName" . -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}

{{- $dbPassword := .Values.secrets.dbPassword -}}
{{- if or (not $dbPassword) (eq $dbPassword "CHANGE_ME") -}}
  {{- if and $existing $existing.data (index $existing.data "db-password") -}}
    {{- $dbPassword = index $existing.data "db-password" | b64dec -}}
  {{- else -}}
    {{- $dbPassword = randAlphaNum 32 -}}
  {{- end -}}
{{- end -}}

{{- $jwtSecret := .Values.secrets.jwtSecret -}}
{{- if or (not $jwtSecret) (eq $jwtSecret "CHANGE_ME_USE_openssl_rand_-base64_32") -}}
  {{- if and $existing $existing.data (index $existing.data "jwt-secret") -}}
    {{- $jwtSecret = index $existing.data "jwt-secret" | b64dec -}}
  {{- else -}}
    {{- $jwtSecret = randAlphaNum 48 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: matrixctrl
  labels:
    {{- include "matrixctrl.labels" . | nindent 4 }}
  annotations:
    # Keep these across helm upgrade/rollback even if the release is deleted.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  db-password: {{ $dbPassword | quote }}
  jwt-secret: {{ $jwtSecret | quote }}
  {{- if .Values.secrets.adminPassword }}
  admin-password: {{ .Values.secrets.adminPassword | quote }}
  {{- end }}
  {{- if .Values.oidc.enabled }}
  oidc-client-id: {{ .Values.oidc.clientId | quote }}
  oidc-client-secret: {{ .Values.oidc.clientSecret | quote }}
  {{- end }}
