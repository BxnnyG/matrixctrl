{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: matrixctrl
  namespace: matrixctrl
  labels:
    {{- include "matrixctrl.labels" . | nindent 4 }}
  annotations:
    # Tell Traefik which entry-point to use
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.ingress.entrypoint }}
    {{- if .Values.ingress.tls }}
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- end }}
    {{- if .Values.ingress.certIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certIssuer | quote }}
    {{- end }}
spec:
  {{- if and .Values.ingress.tls .Values.ingress.certIssuer }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: matrixctrl-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: matrixctrl
                port:
                  name: http
{{- end }}
